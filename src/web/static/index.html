<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuestCut-AI Web</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
      --bg: #0f0f10;
      --panel: #18181b;
      --panel-2: #111114;
      --border: #2f3037;
      --muted: #a1a1aa;
      --text: #f8fafc;
      --accent: #4f46e5;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: radial-gradient(circle at 20% 0%, #1f1f2a, var(--bg) 38%); color: var(--text); }
    main { max-width: 1320px; margin: 28px auto; padding: 20px; }
    .card { background: color-mix(in srgb, var(--panel) 94%, transparent); border: 1px solid var(--border); border-radius: 22px; padding: 26px; box-shadow: 0 24px 80px #0009; }
    .topbar { display: flex; gap: 18px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; }
    h1 { margin: 0 0 8px; font-size: clamp(30px, 4vw, 48px); }
    h2, h3 { margin: 0 0 12px; }
    p { color: var(--muted); }
    .toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) minmax(180px, .5fr); gap: 14px; margin: 20px 0; }
    label { display: block; margin: 0 0 8px; font-weight: 800; }
    input, select, button { width: 100%; border-radius: 13px; border: 1px solid #3f3f46; background: #09090b; color: #fafafa; padding: 12px 14px; font-size: 15px; }
    button { background: var(--accent); border: 0; cursor: pointer; font-weight: 900; transition: transform .12s ease, opacity .12s ease; }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button.secondary { background: #27272a; border: 1px solid #3f3f46; }
    button.success { background: var(--accent-2); color: #052e16; }
    button.danger { background: #3f1d24; color: #fecdd3; border: 1px solid #7f1d1d; }
    button:focus-visible, input:focus-visible, select:focus-visible, .dropzone:focus-visible, .queue-item:focus-visible { outline: 3px solid #818cf8; outline-offset: 2px; }
    .dropzone { border: 1px dashed #52525b; background: #09090bcc; border-radius: 18px; padding: 18px; min-height: 82px; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--muted); cursor: pointer; }
    .dropzone.dragover { border-color: #818cf8; background: #312e81; color: white; }
    .actions { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin: 16px 0 10px; }
    .status { min-height: 24px; color: var(--muted); font-size: 14px; }
    .workspace { display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-top: 22px; }
    .queue, .preview-card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .stat { background: #09090b; border: 1px solid #27272a; border-radius: 13px; padding: 10px; text-align: center; }
    .stat b { display: block; font-size: 22px; }
    .file-list { display: grid; gap: 8px; max-height: 610px; overflow: auto; padding-right: 4px; }
    .queue-item { text-align: left; background: #09090b; border: 1px solid #27272a; border-radius: 13px; padding: 10px; cursor: pointer; }
    .queue-item.active { border-color: #818cf8; background: #1e1b4b; }
    .name { font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta { margin-top: 5px; font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; gap: 8px; }
    .badge { border-radius: 999px; padding: 2px 8px; background: #27272a; color: #e4e4e7; white-space: nowrap; }
    .badge.done { background: #064e3b; color: #bbf7d0; }
    .badge.error { background: #7f1d1d; color: #fecaca; }
    .badge.busy { background: #78350f; color: #fde68a; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .image-box { min-height: 420px; display: flex; align-items: center; justify-content: center; background: #050506; border: 1px solid #27272a; border-radius: 16px; overflow: hidden; }
    .checker { background: repeating-conic-gradient(#ddd 0% 25%, #aaa 0% 50%) 50% / 24px 24px; }
    img { max-width: 100%; max-height: 620px; display: block; }
    .empty { color: var(--muted); padding: 30px; text-align: center; }
    .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }
    @media (max-width: 980px) { .workspace, .preview-grid, .toolbar { grid-template-columns: 1fr; } .actions { grid-template-columns: 1fr 1fr; } main { margin: 0; padding: 10px; } .card { padding: 16px; border-radius: 16px; } }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="topbar">
        <div>
          <h1>QuestCut-AI Web</h1>
          <p>本地网页抠图工作台。支持多图队列、批量处理、当前结果下载和批量 ZIP 下载。</p>
        </div>
      </div>

      <div id="dropzone" class="dropzone" tabindex="0">
        <div>
          <strong>拖拽图片到这里，或点击选择文件</strong><br />
          <span>支持 PNG / JPG / WebP / BMP / TIFF / GIF，可多选</span>
        </div>
      </div>
      <input id="file" name="file" type="file" accept="image/png,image/jpeg,image/webp,image/bmp,image/tiff,image/gif" multiple hidden />

      <div class="toolbar">
        <div>
          <label for="model">模型</label>
          <select id="model" name="model_key"></select>
        </div>
        <div>
          <label for="format">输出格式</label>
          <select id="format" name="output_format">
            <option value="png">PNG（透明）</option>
            <option value="webp">WebP</option>
            <option value="jpg">JPG（白底）</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="process-current" type="button">处理当前</button>
        <button id="process-all" type="button">批量处理</button>
        <button id="download-current" type="button" class="success">下载当前</button>
        <button id="download-zip" type="button" class="secondary">批量 ZIP</button>
        <button id="clear" type="button" class="danger">清空</button>
      </div>
      <p id="status" class="status">请选择图片。</p>

      <div class="workspace">
        <aside class="queue">
          <h2>图片队列</h2>
          <div class="stats">
            <div class="stat"><b id="total-count">0</b><span>总数</span></div>
            <div class="stat"><b id="done-count">0</b><span>完成</span></div>
            <div class="stat"><b id="failed-count">0</b><span>失败</span></div>
          </div>
          <div id="file-list" class="file-list"><div class="empty">暂无图片</div></div>
          <p class="hint">点击队列项可切换预览；批量处理不会丢失已完成结果。</p>
        </aside>

        <section class="preview-card">
          <div class="preview-grid">
            <div>
              <h2>原图</h2>
              <div class="image-box"><img id="original" alt="原图预览" /></div>
            </div>
            <div>
              <h2>结果</h2>
              <div class="image-box checker"><img id="result" alt="结果预览" /></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const modelSelect = document.querySelector('#model');
    const formatSelect = document.querySelector('#format');
    const statusEl = document.querySelector('#status');
    const original = document.querySelector('#original');
    const result = document.querySelector('#result');
    const fileInput = document.querySelector('#file');
    const dropzone = document.querySelector('#dropzone');
    const fileList = document.querySelector('#file-list');
    const totalCount = document.querySelector('#total-count');
    const doneCount = document.querySelector('#done-count');
    const failedCount = document.querySelector('#failed-count');
    const processCurrentBtn = document.querySelector('#process-current');
    const processAllBtn = document.querySelector('#process-all');
    const downloadCurrentBtn = document.querySelector('#download-current');
    const downloadZipBtn = document.querySelector('#download-zip');
    const clearBtn = document.querySelector('#clear');

    let items = [];
    let activeIndex = -1;
    let busy = false;

    const setStatus = text => { statusEl.textContent = text; };
    const extFor = () => formatSelect.value === 'jpg' ? 'jpg' : formatSelect.value;
    const outputName = file => `${file.name.replace(/\.[^.]+$/, '') || 'image'}_nobg.${extFor()}`;

    function makeItem(file) {
      return { file, status: 'pending', error: '', originalUrl: URL.createObjectURL(file), resultUrl: '', resultBlob: null };
    }

    function addFiles(fileArray) {
      const accepted = fileArray.filter(file => file.type.startsWith('image/'));
      if (!accepted.length) { setStatus('没有可用图片。'); return; }
      items.push(...accepted.map(makeItem));
      if (activeIndex < 0) activeIndex = 0;
      render();
      setStatus(`已加入 ${accepted.length} 张图片。`);
    }

    function render() {
      totalCount.textContent = items.length;
      doneCount.textContent = items.filter(item => item.status === 'done').length;
      failedCount.textContent = items.filter(item => item.status === 'error').length;
      fileList.innerHTML = '';
      if (!items.length) {
        fileList.innerHTML = '<div class="empty">暂无图片</div>';
      }
      items.forEach((item, index) => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = `queue-item ${index === activeIndex ? 'active' : ''}`;
        row.addEventListener('click', () => { activeIndex = index; render(); });

        const name = document.createElement('div');
        name.className = 'name';
        name.title = item.file.name;
        name.textContent = item.file.name;

        const meta = document.createElement('div');
        meta.className = 'meta';
        const size = document.createElement('span');
        size.textContent = `${(item.file.size / 1024 / 1024).toFixed(2)} MB`;
        const badge = document.createElement('span');
        badge.className = `badge ${item.status === 'done' ? 'done' : item.status === 'error' ? 'error' : item.status === 'processing' ? 'busy' : ''}`;
        badge.textContent = item.status === 'done' ? '完成' : item.status === 'error' ? '失败' : item.status === 'processing' ? '处理中' : '待处理';
        meta.append(size, badge);
        row.append(name, meta);
        fileList.append(row);
      });

      const active = items[activeIndex];
      original.src = active ? active.originalUrl : '';
      result.src = active && active.resultUrl ? active.resultUrl : '';
      processCurrentBtn.disabled = busy || !active;
      processAllBtn.disabled = busy || !items.length;
      downloadCurrentBtn.disabled = !active || !active.resultBlob;
      downloadZipBtn.disabled = busy || !items.length;
      clearBtn.disabled = busy || !items.length;
    }

    async function processItem(index) {
      const item = items[index];
      if (!item) return;
      item.status = 'processing';
      item.error = '';
      render();
      const body = new FormData();
      body.append('file', item.file, item.file.name);
      body.append('model_key', modelSelect.value);
      body.append('output_format', formatSelect.value);
      const resp = await fetch('/api/remove-background', { method: 'POST', body });
      if (!resp.ok) throw new Error((await resp.json()).detail || resp.statusText);
      const blob = await resp.blob();
      if (item.resultUrl) URL.revokeObjectURL(item.resultUrl);
      item.resultBlob = blob;
      item.resultUrl = URL.createObjectURL(blob);
      item.status = 'done';
    }

    async function processCurrent() {
      if (activeIndex < 0) return;
      busy = true; render(); setStatus('正在处理当前图片...');
      try {
        await processItem(activeIndex);
        setStatus('当前图片处理完成。');
      } catch (err) {
        const item = items[activeIndex];
        if (item) { item.status = 'error'; item.error = err.message; }
        setStatus('失败：' + err.message);
      } finally { busy = false; render(); }
    }

    async function processAll() {
      if (!items.length) return;
      busy = true; render();
      let ok = 0; let failed = 0;
      for (let i = 0; i < items.length; i++) {
        activeIndex = i;
        setStatus(`批量处理中 ${i + 1}/${items.length}：${items[i].file.name}`);
        try { await processItem(i); ok++; }
        catch (err) { items[i].status = 'error'; items[i].error = err.message; failed++; }
      }
      busy = false; render();
      setStatus(`批量完成：成功 ${ok}，失败 ${failed}。`);
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.append(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    function downloadCurrent() {
      const item = items[activeIndex];
      if (item && item.resultBlob) downloadBlob(item.resultBlob, outputName(item.file));
    }

    async function downloadZip() {
      if (!items.length) return;
      busy = true; render(); setStatus('正在生成批量 ZIP...');
      try {
        const body = new FormData();
        items.forEach(item => body.append('files', item.file, item.file.name));
        body.append('model_key', modelSelect.value);
        body.append('output_format', formatSelect.value);
        const resp = await fetch('/api/remove-background-batch', { method: 'POST', body });
        if (!resp.ok) throw new Error((await resp.json()).detail || resp.statusText);
        downloadBlob(await resp.blob(), 'QuestCut-AI-batch.zip');
        setStatus('批量 ZIP 已生成。');
      } catch (err) { setStatus('ZIP 生成失败：' + err.message); }
      finally { busy = false; render(); }
    }

    function clearAll() {
      items.forEach(item => { URL.revokeObjectURL(item.originalUrl); if (item.resultUrl) URL.revokeObjectURL(item.resultUrl); });
      items = []; activeIndex = -1; render(); setStatus('已清空。');
    }

    fetch('/api/models').then(r => r.json()).then(data => {
      modelSelect.innerHTML = '';
      data.models.forEach(model => {
        const opt = document.createElement('option');
        opt.value = model.key;
        opt.textContent = `${model.display_name} - ${model.size || ''}`;
        modelSelect.append(opt);
      });
    }).catch(() => { setStatus('模型列表加载失败。'); });

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') fileInput.click(); });
    dropzone.addEventListener('dragover', event => { event.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', event => {
      event.preventDefault(); dropzone.classList.remove('dragover'); addFiles([...event.dataTransfer.files]);
    });
    fileInput.addEventListener('change', event => { addFiles([...event.target.files]); fileInput.value = ''; });
    processCurrentBtn.addEventListener('click', processCurrent);
    processAllBtn.addEventListener('click', processAll);
    downloadCurrentBtn.addEventListener('click', downloadCurrent);
    downloadZipBtn.addEventListener('click', downloadZip);
    clearBtn.addEventListener('click', clearAll);
    formatSelect.addEventListener('change', render);
    render();
  </script>
</body>
</html>
